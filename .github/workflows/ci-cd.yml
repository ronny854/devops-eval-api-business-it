name: CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    name: Build, test and coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          format: table
          output: trivy-fs-results.txt
          exit-code: '0'

      - name: Show Trivy filesystem scan report
        if: always()
        run: cat trivy-fs-results.txt

      - name: Upload Trivy filesystem scan report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-filesystem-report
          path: trivy-fs-results.txt
          if-no-files-found: warn
          retention-days: 14

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != '' }}
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download coverage report
        uses: actions/download-artifact@v8
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != '' }}
        with:
          name: coverage-lcov
          path: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != '' }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src
            -Dsonar.tests=test
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Skip SonarQube
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' || env.SONAR_ORGANIZATION == '' || env.SONAR_PROJECT_KEY == '' }}
        run: echo "SonarQube Cloud configuration is incomplete; set SONAR_TOKEN, SONAR_HOST_URL, SONAR_ORGANIZATION and SONAR_PROJECT_KEY to enable the quality gate."

  publish-artifact:
    name: Publish Docker image and release
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - sonarqube
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}"
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "image=${IMAGE}"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" --username "${{ github.actor }}" --password-stdin

      - name: Build image for security scan
        run: docker build --pull --tag "${{ steps.meta.outputs.image }}:scan" .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}:scan
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          format: table
          output: trivy-image-results.txt
          exit-code: '0'

      - name: Show Trivy image scan report
        if: always()
        run: cat trivy-image-results.txt

      - name: Upload Trivy image scan report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-image-report
          path: trivy-image-results.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Publish image to GHCR
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          VERSION: ${{ steps.version.outputs.version }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
        run: |
          docker tag "${IMAGE}:scan" "${IMAGE}:${VERSION}"
          docker tag "${IMAGE}:scan" "${IMAGE}:latest"
          docker tag "${IMAGE}:scan" "${IMAGE}:sha-${SHORT_SHA}"

          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:sha-${SHORT_SHA}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: publish-artifact
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --silent --show-error --request POST "${RENDER_DEPLOY_HOOK_URL}"

      - name: Skip Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured; skipping optional Render deployment."
